name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Node 20 is safer than 22 for native npm dependencies
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2. CHANGED TO JAVA 17: Crucial for Gradle/Android compatibility
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      # 3. BUILD YOUR ACTUAL WEB CODE! 
      # (If your project uses Next.js, React, Vite, etc., it generates the 'out' or 'dist' folder)
      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android --verbose

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk